<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Chatbot</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:Poppins;}
body {
  background: linear-gradient(135deg,#d7d7d7,#f1f1f1);
  height:100vh;display:flex;justify-content:center;align-items:center;
}
.chat-container {
  width:420px;height:90vh;background:#fff;border-radius:20px;
  box-shadow:0 8px 25px rgba(0,0,0,0.2);
  display:flex;flex-direction:column;overflow:hidden;
}
.chat-header {
  background:#616161;padding:15px;color:#fff;text-align:center;
}
.chat-box {flex:1;padding:15px;overflow-y:auto;background:#f5f5f5;}
.user-message p {background:#757575;color:white;padding:10px;border-radius:15px;}
.bot-message p {background:#e0e0e0;padding:10px;border-radius:15px;}
.input-area {display:flex;padding:10px;background:#eee;}
input {flex:1;padding:10px;border-radius:20px;border:none;}
button {margin-left:5px;padding:10px;border:none;border-radius:50%;background:#757575;color:white;}
</style>
</head>

<body>

<div class="chat-container">
  <div class="chat-header">AI ChatBot</div>

  <div class="chat-box" id="chat-box"></div>

  <div class="input-area">
    <input type="text" id="user-input" placeholder="Type message..." />
    <button onclick="sendMessage()">➤</button>
  </div>
</div>

<script>
const chatBox = document.getElementById("chat-box");

function addMessage(text, type) {
  const div = document.createElement("div");
  div.className = type + "-message";
  div.innerHTML = "<p>" + text + "</p>";
  chatBox.appendChild(div);
}

async function sendMessage() {
  const input = document.getElementById("user-input");
  const message = input.value;
  if (!message) return;

  addMessage(message, "user");
  input.value = "";

  const res = await fetch("http://127.0.0.1:5000/chat", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({message: message})
  });

  const data = await res.json();
  addMessage(data.response, "bot");
}
</script>

</body>
</html>
